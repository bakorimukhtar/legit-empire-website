    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #1B140D;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.9s cubic-bezier(0.16, 1, 0.3, 1);
      }
      #splash.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-mark {
        width: 120px;
        height: 100px;
        overflow: visible;
      }
      .splash-mark path, 
      .splash-mark polyline, 
      .splash-mark rect {
        fill: none;
        stroke: #E4B368;
        stroke-width: 2.2;
        stroke-linecap: square;
        stroke-linejoin: miter;
        stroke-dasharray: 900;
        stroke-dashoffset: 900;
        animation: drawSplash 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .splash-mark .fill-block {
        fill: #E4B368;
        stroke: none;
        opacity: 0;
        animation: blockfadeSplash 0.5s ease forwards 0.9s;
      }
      @keyframes drawSplash {
        to { stroke-dashoffset: 0; }
      }
      @keyframes blockfadeSplash {
        to { opacity: 1; }
      }
      .splash-word {
        margin-top: 22px;
        font-family: 'Space Grotesk', monospace;
        font-size: 13px;
        letter-spacing: 0.42em;
        color: rgba(251, 247, 240, 0.7);
        opacity: 0;
        animation: fadeUpSplash 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 1.3s;
      }
      .splash-rule {
        margin-top: 20px;
        width: 60px;
        height: 1px;
        background: rgba(228, 179, 104, 0.3);
        position: relative;
        overflow: hidden;
      }
      .splash-rule::after {
        content: "";
        position: absolute;
        inset: 0;
        background: #E4B368;
        transform: translateX(-100%);
        animation: fillbarSplash 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards 1.5s;
      }
      @keyframes fillbarSplash {
        to { transform: translateX(0); }
      }
      @keyframes fadeUpSplash {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .survey-mark { position: fixed; width: 26px; height: 26px; z-index: 9999; }
